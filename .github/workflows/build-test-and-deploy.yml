name: Build, Test and Deploy Solution

on:
  workflow_dispatch:
    inputs:
      run-ui-tests:
        description: '¿Ejecutar los UI tests contra Dataverse?'
        required: true
        type: boolean
        default: false
      run-deploy:
        description: '¿Ejecutar el deploy tras los tests?'
        required: true
        type: boolean
        default: false
      environment-url:
        description: 'URL del entorno (ej: https://miorg.crm4.dynamics.com) - solo si run-deploy = true'
        required: false

jobs:
  build-and-test:
    name: Build and Test Plugin
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages (packages.config)
        run: nuget restore PluginsDataverse.slnx
        working-directory: plugin

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: msbuild PluginsDataverse.slnx /p:Configuration=Release /p:Platform="Any CPU"
        working-directory: plugin

      - name: Run unit tests (MSTest)
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Recurse -Filter "PluginsDataverse.Tests.dll" | Select-Object -First 1
          if (-not $dll) { Write-Error "No se encontró PluginsDataverse.Tests.dll"; exit 1 }
          Write-Host "DLL encontrado en: $($dll.FullName)"
          dotnet vstest "$($dll.FullName)"
        working-directory: plugin

      - name: Run unit tests (FakeXrmEasy)
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Recurse -Filter "PluginsDataverse.FakeXrmTests.dll" | Select-Object -First 1
          if (-not $dll) { Write-Error "No se encontró PluginsDataverse.FakeXrmTests.dll"; exit 1 }
          Write-Host "DLL encontrado en: $($dll.FullName)"
          dotnet vstest "$($dll.FullName)"
        working-directory: plugin

      - name: Create UI test appsettings.json
        if: github.event.inputs.run-ui-tests == 'true'
        shell: pwsh
        env:
          APPSETTINGS: ${{ secrets.DATAVERSE_APPSETTINGS_JSON }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:APPSETTINGS)) {
            Write-Error "El secret DATAVERSE_APPSETTINGS_JSON no está configurado. Ve a Settings > Secrets and variables > Actions y crea el secret."
            exit 1
          }
          $outDir = "PluginsDataverse.UITests\bin\Release\net8.0"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $env:APPSETTINGS | Set-Content "$outDir\appsettings.json" -Encoding UTF8
          Write-Host "appsettings.json generado en $outDir"
        working-directory: plugin

      - name: Install Playwright browsers
        if: github.event.inputs.run-ui-tests == 'true'
        shell: pwsh
        run: |
          $ps1 = "PluginsDataverse.UITests\bin\Release\net8.0\playwright.ps1"
          if (Test-Path $ps1) {
            & pwsh $ps1 install chromium
          } else {
            Write-Error "No se encontró playwright.ps1 en $ps1"
          }
        working-directory: plugin

      - name: Run UI tests
        if: github.event.inputs.run-ui-tests == 'true'
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Recurse -Filter "PluginsDataverse.UITests.dll" | Select-Object -First 1
          if (-not $dll) { Write-Error "No se encontró PluginsDataverse.UITests.dll"; exit 1 }
          Write-Host "DLL encontrado en: $($dll.FullName)"
          dotnet vstest "$($dll.FullName)"
        working-directory: plugin

  deploy:
    name: Deploy Solution
    needs: build-and-test
    if: ${{ github.event.inputs.run-deploy == 'true' }}
    runs-on: windows-latest
    environment: Power Platform Dev Environment

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Pack solution
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: solutions/GithubActionsSolucinpersonalizada
          solution-file: out/GithubActionsSolucinpersonalizada.zip
          solution-type: Both

      - name: Import solution
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ github.event.inputs.environment-url }}
          app-id: ${{ secrets.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ vars.PP_TENANT_ID }}
          solution-file: out/GithubActionsSolucinpersonalizada_managed.zip
          force-overwrite: true
          publish-changes: true
