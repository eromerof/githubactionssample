name: Export Solution from Dev

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: windows-latest
    environment: Power Platform Dev Environment

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Export solution (unmanaged)
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.PP_DEV_ENV_URL }}
          app-id: ${{ secrets.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ vars.PP_TENANT_ID }}
          solution-name: GithubActionsSolucinpersonalizada
          solution-output-file: out/GithubActionsSolucinpersonalizada.zip
          managed: false

      - name: Unpack solution
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: out/GithubActionsSolucinpersonalizada.zip
          solution-folder: solutions/GithubActionsSolucinpersonalizada
          solution-type: Unmanaged
          overwrite-files: true

        
      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add solutions/
          if git diff --staged --quiet; then
            echo "No hay cambios que commitear."
          else
            git commit -m "chore: export GithubActionsSolucinpersonalizada from Dev"
            git push origin main
          fi