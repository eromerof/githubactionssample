name: Create Sandbox and Deploy Solution

on:
  workflow_dispatch:
    inputs:
      environment-name:
        description: 'Nombre del entorno sandbox a crear'
        required: true
        default: 'Sandbox-Deploy'

jobs:
  create-and-deploy:
    runs-on: windows-latest
    environment: Power Platform Dev Environment

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Create sandbox environment
        uses: microsoft/powerplatform-actions/create-environment@v1
        with:
          app-id: ${{ secrets.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ vars.PP_TENANT_ID }}
          name: ${{ github.event.inputs.environment-name }}
          type: Sandbox
          region: europe
          currency: EUR
          language: 3082
          domain: ${{ github.event.inputs.environment-name }}

      - name: Pack solution
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: solutions/GithubActionsSolucinpersonalizada
          solution-file: out/GithubActionsSolucinpersonalizada_managed.zip
          solution-type: Managed

      - name: Import solution to sandbox
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: https://${{ github.event.inputs.environment-name }}.crm4.dynamics.com
          app-id: ${{ secrets.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ vars.PP_TENANT_ID }}
          solution-file: out/GithubActionsSolucinpersonalizada_managed.zip
          force-overwrite: true
          publish-changes: true
